const sectionMap={};
sections.forEach(s=>s.questions.forEach(q=>{sectionMap[q.id]=s;}));
function initAnswers(){sections.forEach(s=>s.questions.forEach(q=>{if(!answers[q.id]){if(q.type==='multi'||q.type==='tags')answers[q.id]=[];else answers[q.id]='';}}));}
initAnswers();
function toggleChip(qid,val,warn){const a=answers[qid];const i=a.indexOf(val);if(i>-1)a.splice(i,1);else a.push(val);renderChips(qid,warn);}
function renderChips(qid,warn){const wrap=document.getElementById('chips_'+qid);if(!wrap)return;wrap.querySelectorAll('.chip').forEach(c=>{const on=answers[qid].includes(c.dataset.val);c.className='chip'+(on?' on'+(warn?' warn':''):'');});}
function addTag(qid){const inp=document.getElementById('taginp_'+qid);const val=inp.value.trim();if(!val)return;if(!answers[qid].includes(val))answers[qid].push(val);inp.value='';renderTags(qid);}
function removeTag(qid,val){answers[qid]=answers[qid].filter(v=>v!==val);renderTags(qid);}
function renderTags(qid){const wrap=document.getElementById('tags_'+qid);if(!wrap)return;wrap.innerHTML=answers[qid].map(v=>`<div class="tag"><span>${v}</span><button onclick="removeTag('${qid}','${v.replace(/'/g,"\\'")}')">x</button></div>`).join('');}
function renderQ(q){
  const hint=q.hint?`<div class="qhint">${q.hint}</div>`:'';
  let input='';
  if(q.type==='text'){
    const val=(answers[q.id]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    input=`<textarea id="ta_${q.id}" placeholder="Enter answer..." onchange="answers['${q.id}']=this.value" oninput="answers['${q.id}']=this.value">${val}</textarea>`;
  }else if(q.type==='toggle'){
    input=`<div class="toggles">${q.options.map(o=>{const on=answers[q.id]===o;return`<div class="tog${on?' on':''}" onclick="answers['${q.id}']='${o.replace(/'/g,"\\'")}';this.parentNode.querySelectorAll('.tog').forEach(t=>t.className='tog');this.className='tog on'">${o}</div>`;}).join('')}</div>`;
  }else if(q.type==='multi'){
    const warn=q.warn||false;
    input=`<div class="chips" id="chips_${q.id}">${q.options.map(o=>{const on=answers[q.id].includes(o);return`<div class="chip${on?' on'+(warn?' warn':''):''}${warn?' warn-chip':''}" data-val="${o}" onclick="toggleChip('${q.id}','${o.replace(/'/g,"\\'")}',${warn})">${o}</div>`;}).join('')}</div>`;
  }else if(q.type==='tags'){
    input=`<div class="tag-wrap" id="tags_${q.id}"></div><div class="tag-input-row"><input id="taginp_${q.id}" type="text" placeholder="Type and press Enter or Add..." onkeydown="if(event.key==='Enter'){event.preventDefault();addTag('${q.id}');}"><button onclick="addTag('${q.id}')">+ Add</button></div>`;
  }
  return`<div class="qblock"><div class="qid">${q.id}</div><div class="qtext">${q.text}</div>${hint}${input}</div>`;
}
function render(){
  const s=sections[cur];
  const total=sections.length;
  document.getElementById('prog').style.width=((cur/total)*100)+'%';
  document.getElementById('navinfo').textContent=`Section ${cur+1} of ${total}`;
  document.getElementById('btnprev').disabled=cur===0;
  const last=cur===total-1;
  document.getElementById('btnnext').style.display=last?'none':'';
  document.getElementById('btnsave').style.display=last?'':'none';
  const lclass=s.layer==='Decision Intelligence'?'di':'tc';
  let html=`<span class="sec-badge ${lclass}">${s.layer}</span><div class="sec-title">${s.title}</div><div class="sec-sub">${s.sub}</div>`;
  s.questions.forEach(q=>{html+=renderQ(q);});
  document.getElementById('body').innerHTML=html;
  s.questions.forEach(q=>{if(q.type==='tags')renderTags(q.id);});
  window.scrollTo(0,0);
}
function go(dir){cur+=dir;if(cur<0)cur=0;if(cur>=sections.length)cur=sections.length-1;render();}
function toast(msg,type){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+(type||'');setTimeout(()=>{t.className='toast';},3500);}
async function saveAll(){
  const btn=document.getElementById('btnsave');
  btn.disabled=true;btn.textContent='Saving to Notion...';
  const allQ=sections.flatMap(s=>s.questions);
  let saved=0,failed=0;
  for(const q of allQ){
    const raw=answers[q.id];
    const answerStr=Array.isArray(raw)?raw.join(', '):raw||'';
    const s=sectionMap[q.id];
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system:`You are a Notion API assistant. Create a page in Notion database ID "${DB}" with these exact properties:
- Question ID (title): "${q.id}"
- Question (rich_text): ${JSON.stringify(q.text)}
- Answer (rich_text): ${JSON.stringify(answerStr)}
- Section (select): "${s.title}"
- Layer (select): "${s.layer}"
Respond only with "created".`,
          messages:[{role:'user',content:`Create page for ${q.id}.`}],
          mcp_servers:[{type:'url',url:'https://mcp.notion.com/mcp',name:'notion-mcp'}]
        })
      });
      if(res.ok)saved++;else failed++;
    }catch(e){failed++;}
  }
  btn.disabled=false;btn.textContent='Save to Notion';
  if(failed===0){
    document.getElementById('body').innerHTML=`<div class="done"><h2>Intelligence profile saved.</h2><p>All ${saved} answers are now live in COMMANDIO's Notion database.<br>The system will begin using this data to personalize Joy's intelligence immediately.</p></div>`;
    document.querySelector('.nav-row').style.display='none';
    document.getElementById('prog').style.width='100%';
  }else{
    toast(`${saved} saved, ${failed} failed. Check Notion connection.`,'err');
  }
}
render();
</script>
